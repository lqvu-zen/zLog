name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # The ui/ tests construct a QApplication; install Qt's runtime libs so the
      # offscreen platform plugin can load without a display.
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglx0 libxkbcommon0

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -q
